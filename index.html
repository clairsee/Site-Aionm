<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href='https://fonts.googleapis.com/css?family=Roboto' rel='stylesheet'>
    <title>Tradutor Aionm</title>
</head>
<body>
    <header>
        <h1>Tradutor Aionm</h1>
    </header>
    <main>
        <input id="input" type="text" placeholder="Escreva o Texto">
        <input type="submit" onclick="submit()" value="Enviar">
    </main>
    <section>
        <h2 id="heading">Resultado</h2>
        <p>Para Frente:</p><p id="forward"></p>
        <p>Para Trás:</p><p id="backward"></p>
        <h3 id="oldheading">Antigas Respostas</h3>
        <p>Para Frente:</p><p id="oldforward"></p>
        <p>Para Trás:</p><p id="oldbackward"></p>
    </section>
<script>
        var fibo = [];
        var fwdOld = "";
        var bckOld = "";
        var oldArgBck = "";
        var oldArgFwd = "";

        function submit() {
            var inputVal = document.getElementById("input").value;
            var count = inputVal.length;

            if (count > 0) {
                fibi(count);
                fwdOld = ShiftFibo(inputVal, count, true);
                bckOld = ShiftFibo(inputVal, count, false);
                document.getElementById("forward").textContent = fwdOld;
                document.getElementById("backward").textContent = bckOld;
                oldArgBck = oldArgBck + bckOld;
                oldArgFwd = oldArgFwd + " " + fwdOld;
            }
            
            document.getElementById("input").value = "";
            document.getElementById("heading").style.display = "block";
            document.getElementById("oldheading").style.display = "block";
            document.getElementById("oldforward").textContent = oldArgBck;
            document.getElementById("oldbackward").textContent = oldArgFwd;
        }

        function fibi(n) {
            fibo = []; 
            if (n > 0) { fibo[0] = 1; }
            if (n > 1) { fibo[1] = 1; }
            for (let i = 2; i < n; i++) {
                fibo[i] = fibo[i - 2] + fibo[i - 1];
            }
        }

        function ShiftFibo(inputString, n, fwdDirection) {
            let resultText = "";
            for (let i = 0; i < n; i++) {
                let shift = fibo[i];
                if (!fwdDirection) {
                    shift = -shift;
                }
                let char = inputString.charAt(i);
                resultText += Shift(char, shift);
            }
            return resultText;
        }

        function Shift(char, shift) {
            if (char >= 'A' && char <= 'Z') {
                let code = char.charCodeAt(0);
                let offSet = ((code - 65 + shift) % 26 + 26) % 26;
                return String.fromCharCode(offSet + 65);
            }
            if (char >= 'a' && char <= 'z') {
                let code = char.charCodeAt(0);
                let offSet = ((code - 97 + shift) % 26 + 26) % 26;
                return String.fromCharCode(offSet + 97);
            }
            return char;
        }
    
</script>
</body>
</html>
